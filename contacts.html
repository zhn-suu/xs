<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Забронировать столик — Nomad Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .section-title { font-family: 'Playfair Display', serif; }
        .nav-link { position: relative; }
        .nav-link:after { content: ''; position: absolute; width: 0; height: 2px; bottom: -2px; left: 0; background-color: #5C4033; transition: width 0.3s; }
        .nav-link:hover:after { width: 100%; }
    </style>
</head>
<body class="bg-[#f8f1e3] text-[#3f2a1f]">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#5C4033] rounded-2xl flex items-center justify-center text-white text-3xl">☕</div>
                    <div>
                        <h1 class="text-3xl font-bold tracking-tighter section-title">Nomad Coffee</h1>
                        <p class="text-xs -mt-1 text-[#8d6f4e]">Астана • с 2024</p>
                    </div>
                </div>
                <div class="hidden md:flex items-center gap-10 text-lg font-medium">
                    <a href="index.html" class="nav-link">Главная</a>
                    <a href="menu.html" class="nav-link">Меню</a>
                    <a href="about.html" class="nav-link">О нас</a>
                    <a href="gallery.html" class="nav-link">Галерея</a>
                    <a href="reviews.html" class="nav-link">Отзывы</a>
                    <a href="contacts.html" class="nav-link text-[#5C4033] font-semibold">Контакты</a>
                </div>
                <button onclick="location.href='contacts.html'" class="bg-[#5C4033] hover:bg-[#3f2a1f] text-white px-8 py-3.5 rounded-2xl font-semibold transition-all flex items-center gap-2">
                    <i class="fas fa-phone"></i> Забронировать
                </button>
            </div>
        </div>
    </nav>

    <!-- КОНТАКТЫ + БРОНИРОВАНИЕ -->
    <section class="py-24 bg-[#3f2a1f] text-white">
        <div class="max-w-5xl mx-auto px-6 grid md:grid-cols-2 gap-16">
            <div>
                <h1 class="text-6xl section-title text-white">Давай встретимся за кофе</h1>
                <p class="mt-6 text-xl text-white/80">Оставь заявку — перезвоним за 5–10 минут</p>
                
                <form id="booking-form" class="mt-12 space-y-8">
                    <input type="text" id="name" placeholder="Как тебя зовут?" class="w-full bg-white/10 border border-white/30 rounded-2xl px-8 py-6 text-white placeholder:text-white/60 focus:outline-none focus:border-white" required>

                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                        <input type="tel" id="phone" placeholder="+7 (___) ___-__-__" class="w-full bg-white/10 border border-white/30 rounded-2xl px-8 py-6 text-white placeholder:text-white/60 focus:outline-none focus:border-white" required>
                        <input type="date" id="date" class="w-full bg-white/10 border border-white/30 rounded-2xl px-8 py-6 text-white focus:outline-none focus:border-white" required>
                        <input type="time" id="time" min="09:00" max="23:59" class="w-full bg-white/10 border border-white/30 rounded-2xl px-8 py-6 text-white focus:outline-none focus:border-white" required>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <input type="number" id="people" min="1" max="20" value="2" placeholder="Кол-во человек" class="w-full bg-white/10 border border-white/30 rounded-2xl px-8 py-6 text-white placeholder:text-white/60 focus:outline-none focus:border-white" required>
                    </div>

                    <button type="submit" class="w-full bg-[#f8f1e3] hover:bg-white text-[#3f2a1f] py-8 rounded-3xl text-2xl font-semibold transition-all shadow-lg">
                        ЗАБРОНИРОВАТЬ СТОЛИК
                    </button>
                </form>
            </div>

            <div class="space-y-10">
                <div class="flex items-center gap-4 text-2xl">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>Мангилик Ел, 22 (ТЦ Астана Молл 2 этаж)</div>
                </div>
                <div class="flex items-center gap-4 text-2xl">
                    <i class="fas fa-phone"></i>
                    <div>+7 777 123 45 67</div>
                </div>
                <div class="flex items-center gap-4 text-2xl">
                    <i class="fas fa-clock"></i>
                    <div>09:00 — 00:00 ежедневно</div>
                </div>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2505.8321200446057!2d71.42075810185035!3d51.09310567714451!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x42458451085e0523%3A0x72386531c15c8c1f!2zIkxhIENyZW1lIiBLb25kaXRlcmzEsWsgQnV0aWfEsQ!5e0!3m2!1sru!2skz!4v1774027809772!5m2!1sru!2skz" width="100%" height="280" style="border:0;border-radius:16px;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
    </section>

    <footer class="bg-[#2a1f16] text-white/70 py-16 text-center">
        <p>© 2024 Nomad Coffee. Астана ❤️</p>
    </footer>

    <script>
        document.getElementById('booking-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name   = document.getElementById('name').value.trim();
            const phone  = document.getElementById('phone').value.trim();
            const date   = document.getElementById('date').value;
            const time   = document.getElementById('time').value;
            const people = document.getElementById('people').value || '2';

            // Проверка обязательных полей
            if (!name || !phone || !date || !time) {
                alert('Заполни все обязательные поля: имя, телефон, дату и время!');
                return;
            }

            // Проверка графика работы: только с 09:00 до 23:59
            const [hours, minutes] = time.split(':').map(Number);
            const timeInMinutes = hours * 60 + minutes;
            const openTime  = 9 * 60;   // 09:00
            const closeTime = 24 * 60;  // 00:00 (но max=23:59, так что 23:59 максимум)

            if (timeInMinutes < openTime || timeInMinutes >= closeTime) {
                alert('Кофейня работает с 09:00 до 00:00.\nВыберите время в этом диапазоне!');
                return;
            }

            // Сообщение в Telegram (твоя формулировка без изменений)
            const message = 
`🔔 *НОВАЯ ЗАЯВКА НА СТОЛИК* в Nomad Coffee

👤 Имя: ${name}
📞 Телефон: ${phone}
📅 Дата: ${date}
⏰ Время: ${time}
👥 Кол-во человек: ${people}

Пожалуйста, проверьте наличие места и подтвердите бронь клиенту по телефону.  
Если места нет сразу отмените и сообщите причину клиенту (например, "к сожалению, на это время все столики заняты, можем предложить другое время?").
`;

            const TOKEN   = '8638826297:AAFoO5Z9tQTJxtMlbo7LWOHwcKzPzk2kTHs';
            const CHAT_ID = '7521078965';

            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.ok) {
                    alert(`Спасибо, ${name}! Заявка отправлена в Telegram. Мы свяжемся в ближайшие 5–10 минут ❤️`);
                    this.reset();
                } else {
                    alert('Ошибка отправки: ' + (data.description || 'неизвестная ошибка'));
                    console.error('Telegram API:', data);
                }
            } catch (err) {
                alert('Не удалось отправить (проверь интернет)');
                console.error('Ошибка:', err);
            }
        });
    </script>
</body>
</html>
